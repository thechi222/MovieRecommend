<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}電影推薦系統{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .movie-card:hover { transform: translateY(-4px); transition: all 0.3s ease; }
        .genre-tag.active { background-color: #e61608; color: white; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
    <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/movies/" class="text-2xl font-bold text-blue-400 tracking-wide">MovieRecommend</a>
            <form method="get" action="/movies/" class="flex gap-2">
                <input type="text" name="title" placeholder="搜尋電影..."
                    value="{{ request.GET.title }}"
                    class="bg-gray-800 text-white px-4 py-2 rounded-lg w-64 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg transition">搜尋</button>
            </form>
            <div class="flex items-center gap-3">
                {% if request.user.is_authenticated %}
                <a href="/users/profile/" class="text-gray-300 hover:text-white transition">{{ request.user.username }}</a>
                <a href="/users/logout/" class="bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded-lg text-sm transition">登出</a>
                {% else %}
                <a href="/users/login/" class="text-gray-300 hover:text-white transition text-sm">登入</a>
                <a href="/users/register/" class="bg-blue-600 hover:bg-blue-700 px-3 py-1 rounded-lg text-sm transition">註冊</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
    <footer class="bg-gray-900 border-t border-gray-800 mt-16 py-6 text-center text-gray-500 text-sm">
        資料來源：The Movie Database (TMDB)
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>

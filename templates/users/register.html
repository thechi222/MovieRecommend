{% extends "base.html" %}
{% block title %}註冊 — CineMatch{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <h1 class="text-3xl font-bold text-white mb-8 text-center">建立帳號</h1>
    <form method="post" class="bg-gray-900 rounded-xl p-8 space-y-5">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label class="text-gray-400 text-sm mb-1 block">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <p class="text-red-400 text-xs mt-1">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-2 rounded-lg transition font-medium">註冊</button>
    </form>
    <p class="text-center text-gray-400 mt-4">已有帳號？<a href="/users/login/" class="text-blue-400 hover:underline">登入</a></p>
</div>
{% endblock %}

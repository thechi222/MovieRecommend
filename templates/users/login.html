{% extends "base.html" %}
{% block title %}登入 — CineMatch{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <h1 class="text-3xl font-bold text-white mb-8 text-center">登入</h1>
    {% if messages %}
    {% for msg in messages %}
    <div class="bg-red-900 text-red-200 px-4 py-3 rounded-lg mb-4">{{ msg }}</div>
    {% endfor %}
    {% endif %}
    <form method="post" class="bg-gray-900 rounded-xl p-8 space-y-5">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label class="text-gray-400 text-sm mb-1 block">{{ field.label }}</label>
            {{ field }}
        </div>
        {% endfor %}
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-2 rounded-lg transition font-medium">登入</button>
    </form>
    <p class="text-center text-gray-400 mt-4">還沒有帳號？<a href="/users/register/" class="text-blue-400 hover:underline">立即註冊</a></p>
</div>
{% endblock %}
